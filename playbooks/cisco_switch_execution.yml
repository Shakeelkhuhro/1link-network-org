---
- name: 1LINK Comprehensive Switch, Router & Compliance Engine
  hosts: all
  gather_facts: false
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: cisco.ios.ios
    ansible_network_cli_ssh_type: paramiko
    
    # PARAMIKO SSH TUNING & SYSTEM CIPHER ALIGNMENT
    ansible_paramiko_look_for_keys: false
    ansible_paramiko_pty: false
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no 
      -o UserKnownHostsFile=/dev/null 
      -o ControlMaster=no 
      -o ServerAliveInterval=30 
      -o Ciphers=aes256-ctr,aes128-ctr,aes256-gcm@openssh.com 
      -o KexAlgorithms=ecdh-sha2-nistp256,group14-sha1

    # TIMEOUT EXTENSIONS FOR SHARED INFRASTRUCTURE
    ansible_command_timeout: 180
    ansible_connect_timeout: 180

  tasks:
    # =========================================================================
    # DYNAMIC INTERFACE MANAGEMENT LAYER (Runs across all pipeline changes)
    # =========================================================================
    - name: Parse Target Interface Configuration Parameters
      vars:
        discovered_interface: "{{ ticket_item.value.fields.description | regex_search('(gi|gigabitethernet|fastethernet|fa|te|tenethernet)[0-9/]+' | lower) }}"
      ansible.builtin.set_fact:
        target_interface: "{{ discovered_interface if discovered_interface is not none else 'GigabitEthernet1/0/1' }}"
        interface_state: "{{ 'disabled' if 'shut' in (ticket_item.value.fields.description | lower) and 'no shut' not in (ticket_item.value.fields.description | lower) else 'enabled' }}"

    - name: Dynamically Enforce Interface State & Descriptions (Shut / No-Shut / Update)
      cisco.ios.ios_interfaces:
        config:
          - name: "{{ target_interface }}"
            enabled: "{{ true if interface_state == 'enabled' else false }}"
            description: "Managed by 1LINK Pipeline - iTop Ticket #{{ ticket_item.value.fields.id }}"
        state: merged

    # =========================================================================
    # 1. SWITCH AUTOMATION LAYER (VLAN Creation / Deletion / Mapping)
    # =========================================================================
    - name: Dynamically Provision VLAN Asset State
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ target_vlan_id }}"
            name: "1LINK_VLAN_{{ target_vlan_id }}"
            state: active
        state: merged
      when: change_action == 'create'

    - name: Configure Access Port and Trunk Interchanges
      cisco.ios.ios_l2_interfaces:
        config:
          - name: "{{ target_interface }}"
            mode: access
            access:
              vlan: "{{ target_vlan_id }}"
          - name: GigabitEthernet1/0/24
            mode: trunk
            trunk:
              allowed_vlans: "1,700-750"
      when: change_action == 'create'

    - name: Dynamically Teardown VLAN Asset State
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ target_vlan_id }}"
        state: deleted
      when: change_action == 'delete'  # <-- SAFEGUARD: Only fires if the ticket specifically demands asset destruction

    # =========================================================================
    # 2. ROUTER CORE ENGINE (IOS-XE)
    # =========================================================================
    - name: Configure Corporate Static Routes for Transit Redundancy
      cisco.ios.ios_static_routes:
        config:
          - dest: 10.254.254.0/24
            next_hops:
              - forward_interface: GigabitEthernet1/0/24
                address: 192.168.255.2
        state: merged

    - name: Deploy Standard Core Access Control Lists (ACLs)
      cisco.ios.ios_acls:
        config:
          - name: "1LINK_SECURITY_EDGE"
            type: extended
            aces:
              - grant: deny
                protocol: ip
                source: any
                destination: 10.99.99.0 0.0.0.255
              - grant: permit
                protocol: ip
                source: any
                destination: any
        state: merged

    - name: Provision OSPF Dynamic Routing Process
      cisco.ios.ios_ospfv2:
        config:
          processes:
            - pid: 100
              areas:
                - area_id: 0.0.0.0
                  networks:
                    - address: 10.0.0.0
                      wildcard: 0.255.255.255
        state: merged

    - name: Configure Corporate BGP External Peering Engine
      cisco.ios.ios_bgp_global:
        config:
          as_number: 65001
          neighbors:
            - address: 192.168.255.1
              remote_as: 65100
              description: "1LINK Primary Core Transit Peer"
        state: merged

    # =========================================================================
    # 3. COMPLIANCE & HARDENING
    # =========================================================================
    - name: Enforce Infrastructure Baseline Profiles
      cisco.ios.ios_config:
        lines:
          - ntp server 10.0.0.1 prefer
          - exec-timeout 15 0
          - logging host 10.0.0.254
          - aaa new-model

