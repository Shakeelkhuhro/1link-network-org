---
- name: 1LINK Switch Core & Compliance Engine
  hosts: all
  gather_facts: false
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: cisco.ios.ios
    
    # PARAMIKO SSH TUNING 
    ansible_paramiko_look_for_keys: false
    ansible_paramiko_pty: false  
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=no -o ServerAliveInterval=10'
    
    # TIMEOUT EXTENSIONS FOR SHARED INFRASTRUCTURE
    ansible_command_timeout: 120
    ansible_connect_timeout: 120

  tasks:
    # ---  SWITCH CORE AUTOMATION ---
    - name: Dynamically Provision VLAN Asset state on Cisco Core
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ target_vlan_id }}"
            name: "1LINK_VLAN_{{ target_vlan_id }}"
            state: active
        state: merged
      when: change_action == 'create'

    - name: Dynamically Teardown VLAN Asset state on Cisco Core
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ target_vlan_id }}"
        state: deleted
      when: change_action == 'delete'

    # ---  COMPLIANCE & HARDENING LAYER ---
    - name: Enforce Global Security Compliance & Hardening Configurations
      cisco.ios.ios_config:
        lines:
          - ntp server 10.0.0.1 prefer
          - exec-timeout 15 0
          - logging host 10.0.0.254
          - aaa new-model
