---
- name: 1LINK Ticket Closure & Compliance Logging Engine
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    ansible_connection: local
    itop_api_url: "http://172.25.115.72/itop/webservices/rest.php?version=1.3"

  tasks:
    - name: Commit Final Closure and Operational Logs to iTop Ticket
      ansible.builtin.uri:
        url: "{{ itop_api_url }}"
        method: POST
        body_format: form-urlencoded
        body:
          auth_user: "{{ itop_user }}"
          auth_pwd: "{{ itop_password }}"
          # Ansible serialize the data structure cleanly to valid JSON at runtime
          json_data: >-
            {{
              {
                "operation": "core/update",
                "class": "UserRequest",
                "key": "SELECT UserRequest WHERE status = 'resolved'",
                "comment": "1LINK Pipeline Execution Success",
                "fields": {
                  "status": "closed",
                  "servicesubcategory_id": "1",
                  "public_log": "Automated Network Provisioning Complete.\nAction: " ~ (change_action | upper) ~ "\nTarget Asset: VLAN " ~ (target_vlan_id | string) ~ "\nStatus: Success\nCompliance Check: Passed."
                }
              } | to_json
            }}
        status_code: 200
      register: itop_close_response

    - name: Debug Closure Status Response
      ansible.builtin.debug:
        var: itop_close_response.json
