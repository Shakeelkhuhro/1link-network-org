---
- name: 1LINK Advanced iTop Ingestion Engine
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    ansible_connection: local  
    itop_api_url: "http://172.25.115.72/itop/webservices/rest.php?version=1.3"

  tasks:
    - name: Fetch Resolved Tickets from iTop
      ansible.builtin.uri:
        url: "{{ itop_api_url }}"
        method: POST
        body_format: form-urlencoded
        body:
          auth_user: "{{ itop_user }}"
          auth_pwd: "{{ itop_password }}"
          json_data: >
            {
              "operation": "core/get",
              "class": "UserRequest",
              "key": "SELECT UserRequest WHERE status = 'resolved'",
              "output_fields": "id, title, description"
            }
        status_code: 200
      register: itop_raw_response

    - name: Fail safe if communication drops or structure is invalid
      ansible.builtin.meta: end_play
      when: >
        itop_raw_response.json is not defined or 
        itop_raw_response.json.objects is not defined

    - name: Process tickets and apply extraction filters
      ansible.builtin.include_tasks: parse_ticket_logic.yml
      loop: "{{ itop_raw_response.json.objects | dict2list }}"
      loop_control:
        loop_var: ticket_item
