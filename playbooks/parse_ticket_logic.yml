---
- name: Sanitize Raw iTop HTML Description
  ansible.builtin.set_fact:
    clean_description: "{{ ticket_item.value.fields.description | regex_replace('<[^>]*>', '') | regex_replace('rgba?\\([^)]*\\)', '') | lower }}"

- name: Extract Clean Change Action and VLAN Asset ID
  ansible.builtin.set_fact:
    # Split 'shut/down' into its own action profile separate from structural deletion
    change_action: >-
      {% if 'delete' in clean_description %}
      delete
      {% elif 'shut' in clean_description or 'down' in clean_description %}
      interface_toggle
      {% else %}
      create
      {% endif %}
    target_vlan_id: "{{ (clean_description | regex_search('vlan\\s*([0-9]+)', '\\1') | first | default('1')) | int }}"

- name: Debug Extracted Parameters for Validation
  ansible.builtin.debug:
    msg:
      - "Processing Ticket ID: {{ ticket_item.value.fields.id }}"
      - "Detected Action: {{ change_action }}"
      - "Extracted Native Integer VLAN ID: {{ target_vlan_id }}"
