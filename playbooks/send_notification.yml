---
- name: 1LINK Notification & Reporting Engine
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Dispatch HTML Operational Summary to NetOps
      community.general.mail:
        host: "smtp.gmail.com"
        port: 587
        secure: starttls
        username: "shakeelkhuhro73@gmail.com" #  sender address
        password: "{{ smtp_password_secret }}"
        to: "shakeelahmedkhu@gmail.com"     # Receiver Address
        subject: "[1LINK AUTO-CHANGE] Lifecycle Completed - Ticket #35"
        subtype: html
        body: |
          <html>
            <body style="font-family: Arial, sans-serif; color: #333;">
              <h2 style="color: #0056b3;">1LINK Automation Pipeline Executive Report</h2>
              <table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%;">
                <tr style="background-color: #f2f2f2;">
                  <td><strong>Attribute</strong></td>
                  <td><strong>Execution Value</strong></td>
                </tr>
                <tr><td>Pipeline Status</td><td style="color: green; font-weight: bold;">SUCCESS</td></tr>
                <tr><td>Action Executed</td><td>{{ change_action | upper }}</td></tr>
                <tr><td>Target Asset</td><td>VLAN {{ target_vlan_id }}</td></tr>
                <tr><td>iTop Database State</td><td>CLOSED (Synced)</td></tr>
              </table>
              <p style="font-size: 11px; color: #777; margin-top: 20px;">This is an automated governance log generated by AWX.</p>
            </body>
          </html>
